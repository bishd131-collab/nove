<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 小说广告素材工厂 - 生产控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loading-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8">
  <div class="mx-auto max-w-6xl space-y-6">
    <div class="text-center space-y-2">
      <h1 class="text-3xl font-extrabold text-slate-800">小说素材全自动工厂</h1>
      <p class="text-slate-500 text-sm">左右 / 上下分屏分开生成；支持<strong class="font-semibold text-slate-600">弹屏</strong>竖屏文案视频；提示词过长可压缩；素材可下载到本机</p>
    </div>

    <div class="grid gap-6 lg:grid-cols-3">
      <div class="lg:col-span-1 space-y-6">
        <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
          <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-wider border-b pb-2">1. 接口配置</h2>
          <div>
            <label class="mb-1 block text-xs font-medium text-slate-700">API 密钥</label>
            <input id="apiKey" type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="sk-..." />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-slate-700">API 地址</label>
            <input id="apiUrl" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" value="https://api.geeknow.top/v1" />
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">对话模型</label>
              <input id="chatModel" type="text" class="w-full rounded-lg border border-slate-300 px-2 py-2 text-xs" value="gpt-4o-mini" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">出图模型</label>
              <input id="imageModel" type="text" class="w-full rounded-lg border border-slate-300 px-2 py-2 text-xs" value="gpt-image-1" />
            </div>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-slate-700">出图提示词上限</label>
            <input id="maxImagePromptChars" type="number" min="0" max="100000" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" value="12000" />
          </div>
          <label class="flex cursor-pointer items-start gap-2 text-sm text-slate-700">
            <input id="compressPrompt" type="checkbox" class="mt-1 rounded border-slate-300" checked />
            <span>提示词过长时用对话模型压缩后再出图</span>
          </label>
        </div>

        <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
          <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-wider border-b pb-2">2. 生产数量</h2>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">带文本单图 (1:1)</label>
              <input id="textSingleCount" type="number" min="0" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" value="0" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">滚屏单图 (9:16)</label>
              <input id="scrollCount" type="number" min="0" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" value="0" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">左右分屏 (1:1)</label>
              <input id="lrSplitCount" type="number" min="0" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" value="0" />
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">上下分屏 (1:1)</label>
              <input id="tbSplitCount" type="number" min="0" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" value="0" />
            </div>
            <div class="col-span-2 rounded-lg border border-violet-100 bg-violet-50/60 p-3">
              <label class="mb-1 block text-xs font-semibold text-violet-800">弹屏视频（竖屏 9:16）</label>
              <input id="popupCount" type="number" min="0" class="mt-1 w-full rounded-lg border border-violet-200 bg-white px-3 py-2 text-sm" value="1" />
            </div>
            <div class="col-span-2">
              <label class="mb-1 block text-xs font-medium text-slate-700">并发数 <span class="text-slate-400">(越大越快，建议1-5)</span></label>
              <input id="maxConcurrent" type="number" min="1" max="10" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" value="3" />
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-2 space-y-6">
        <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
          <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-wider border-b pb-2">3. 核心内容</h2>
          <div>
            <label class="mb-1 block text-sm font-medium text-slate-700">小说内容</label>
            <textarea id="novelContent" rows="4" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none" placeholder="粘贴小说内容..."></textarea>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700">视频滚动文本</label>
              <textarea id="videoText" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none" placeholder="将显示在视频上的文字..."></textarea>
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700">弹屏配色</label>
              <select id="videoStyle" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm min-h-[42px]">
                <option value="random">随机黑白配色</option>
                <option value="white_bg">白底黑字</option>
                <option value="black_bg">黑底白字</option>
              </select>
            </div>
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium text-slate-700">最终提示词</label>
            <textarea id="globalPrompt" rows="4" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none" placeholder="欧美写实、光影..."></textarea>
          </div>

          <div class="space-y-3">
            <button id="startBtn" type="button" onclick="startProduction()" class="w-full rounded-xl bg-indigo-600 py-4 text-lg font-bold text-white shadow-lg transition-all hover:bg-indigo-700 active:scale-[0.98]">
              开始全自动生产
            </button>
            <button id="cancelBtn" type="button" onclick="cancelProduction()" class="hidden w-full rounded-xl border-2 border-red-500 py-2 text-sm font-bold text-red-500 transition-all hover:bg-red-50 active:scale-[0.98]">
              取消当前生成任务
            </button>
          </div>
        </div>

        <!-- history panel -->
        <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
          <div class="flex items-center justify-between border-b pb-2">
            <h2 class="text-sm font-bold text-emerald-600 uppercase tracking-wider">????</h2>
            <button onclick="clearHistory()" class="rounded border border-red-300 px-2 py-1 text-[10px] text-red-500 hover:bg-red-50">????</button>
          </div>
          <div id="historyList" class="max-h-96 overflow-y-auto space-y-2 text-xs">
            <p class="text-slate-400">???...</p>
          </div>
        </div>

        <div id="resultSection" class="hidden rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-2 border-b pb-2">
            <h2 class="text-lg font-bold text-slate-800">生产成果</h2>
            <div class="flex flex-wrap items-center gap-2">
              <span id="batchTag" class="rounded bg-slate-100 px-2 py-1 text-xs text-slate-500 font-mono"></span>
              <button type="button" id="downloadAllBtn" onclick="downloadAllAssets()" class="hidden rounded-lg bg-slate-800 px-3 py-1.5 text-xs font-semibold text-white hover:bg-slate-900">
                下载全部
              </button>
            </div>
          </div>
          <div id="statusNotice" class="rounded-lg bg-blue-50 p-4 text-sm font-medium text-blue-800 whitespace-pre-wrap"></div>
          <div id="warnBox" class="hidden rounded-lg bg-amber-50 p-3 text-xs text-amber-900 whitespace-pre-wrap"></div>
          <div id="imageGallery" class="grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-4"></div>
          <div id="videoList" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let lastPayloadUrls = [];

    function absUrl(path) {
      if (!path) return "";
      if (path.startsWith("http")) return path;
      const base = window.location.origin.replace(/\/$/, "");
      return base + (path.startsWith("/") ? path : "/" + path);
    }

    async function downloadBlobUrl(url, filename) {
      const res = await fetch(url, { credentials: "same-origin" });
      const blob = await res.blob();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename || "download";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }

    async function downloadAllAssets() {
      const btn = document.getElementById("downloadAllBtn");
      if (!lastPayloadUrls.length) return;
      btn.disabled = true;
      try {
        for (let i = 0; i < lastPayloadUrls.length; i++) {
          const item = lastPayloadUrls[i];
          await downloadBlobUrl(item.url, item.name);
          await new Promise(r => setTimeout(r, 350));
        }
      } catch (e) {
        alert("?????" + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    // --- Streaming image render ---
    function appendImageCard(src, label) {
      const gallery = document.getElementById("imageGallery");
      const full = absUrl(src);
      const name = src.split("/").pop();
      const wrap = document.createElement("div");
      wrap.className = "relative overflow-hidden rounded-lg border border-slate-200 bg-slate-100 animate-pulse";
      wrap.innerHTML = `<img src="${full}" class="aspect-square w-full object-cover" loading="lazy" onload="this.parentElement.classList.remove('animate-pulse')" />
        <div class="absolute top-1 left-1 rounded bg-black/60 px-1.5 py-0.5 text-[9px] text-white">${label || ""}</div>
        <button type="button" class="absolute bottom-1 right-1 rounded bg-black/70 px-2 py-0.5 text-[10px] text-white hover:bg-black">??</button>`;
      wrap.querySelector("button").onclick = () => downloadBlobUrl(full, name);
      gallery.appendChild(wrap);
      lastPayloadUrls.push({ url: full, name: name });
      document.getElementById("downloadAllBtn").classList.remove("hidden");
    }

    function appendVideoCard(title, badge, src, btnLabel) {
      const videoList = document.getElementById("videoList");
      const full = absUrl(src);
      const name = src.split("/").pop();
      const row = document.createElement("div");
      row.className = "space-y-2";
      row.innerHTML = `<div class="flex items-center gap-2"><span class="text-xs font-bold">${title}</span><span class="${badge} rounded px-2 py-0.5 text-[10px]">??</span></div>
        <div class="flex flex-wrap items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 p-2">
          <video src="${full}" controls class="max-h-48 rounded"></video>
          <button class="rounded bg-indigo-600 px-3 py-1 text-xs font-semibold text-white">${btnLabel}</button>
        </div>`;
      row.querySelector("button").onclick = () => downloadBlobUrl(full, name);
      videoList.appendChild(row);
      lastPayloadUrls.push({ url: full, name: name });
      document.getElementById("downloadAllBtn").classList.remove("hidden");
    }

    // --- History functions ---
    async function loadHistory() {
      try {
        const r = await fetch("/api/history");
        const data = await r.json();
        renderHistory(data);
      } catch (e) {
        document.getElementById("historyList").innerHTML = '<p class="text-slate-400">????</p>';
      }
    }

    function renderHistory(entries) {
      const list = document.getElementById("historyList");
      if (!entries || !entries.length) {
        list.innerHTML = '<p class="text-slate-400">??????</p>';
        return;
      }
      // Show newest first
      const reversed = [...entries].reverse();
      list.innerHTML = reversed.map((e, i) => {
        const typeLabel = { text_single: "????", lr: "????", tb: "????", scroll: "??", popup_bg: "????" }[e.type] || e.type;
        return `<div class="flex gap-2 rounded border border-slate-100 p-2 hover:bg-slate-50">
          <img src="${absUrl(e.image_url)}" class="h-16 w-16 rounded object-cover flex-shrink-0 cursor-pointer" onclick="window.open('${absUrl(e.image_url)}')" title="??????" />
          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-1"><span class="rounded bg-indigo-100 px-1 text-[10px] text-indigo-700">${typeLabel}</span><span class="text-[10px] text-slate-400">${e.timestamp}</span></div>
            <p class="mt-0.5 truncate text-[11px] text-slate-600" title="${e.prompt.replace(/"/g, "'&quot;'")}">${e.prompt.length > 60 ? e.prompt.slice(0, 60) + "..." : e.prompt}</p>
          </div>
        </div>`;
      }).join("");
    }

    async function clearHistory() {
      if (!confirm("???????????")) return;
      await fetch("/api/history/clear", { method: "POST" });
      renderHistory([]);
    }

    // --- Cancel ---
    async function cancelProduction() {
      const cancelBtn = document.getElementById("cancelBtn");
      cancelBtn.innerText = "????????...";
      cancelBtn.disabled = true;
      try {
        await fetch("/api/cancel", { method: "POST" });
      } catch (e) {
        console.error("??????", e);
      }
    }

    // --- Main SSE streaming production ---
    async function startProduction() {
      const btn = document.getElementById("startBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const resultSection = document.getElementById("resultSection");
      const statusNotice = document.getElementById("statusNotice");

      btn.disabled = true;
      cancelBtn.classList.remove("hidden");
      cancelBtn.disabled = false;
      cancelBtn.innerText = "????????";
      btn.innerHTML = `<span class="flex items-center justify-center"><svg class="loading-spin h-5 w-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ?????...</span>`;

      const payload = {
        api_key: document.getElementById("apiKey").value,
        api_url: document.getElementById("apiUrl").value,
        chat_model_name: document.getElementById("chatModel").value,
        image_model_name: document.getElementById("imageModel").value,
        novel_content: document.getElementById("novelContent").value,
        prompt: document.getElementById("globalPrompt").value,
        video_text: document.getElementById("videoText").value,
        text_single_count: parseInt(document.getElementById("textSingleCount").value) || 0,
        lr_split_count: parseInt(document.getElementById("lrSplitCount").value) || 0,
        tb_split_count: parseInt(document.getElementById("tbSplitCount").value) || 0,
        scroll_count: parseInt(document.getElementById("scrollCount").value) || 0,
        popup_count: parseInt(document.getElementById("popupCount").value) || 0,
        video_style: document.getElementById("videoStyle").value,
        compress_prompt_before_image: document.getElementById("compressPrompt").checked,
        max_image_prompt_chars: parseInt(document.getElementById("maxImagePromptChars").value) || 12000,
        max_concurrent: parseInt(document.getElementById("maxConcurrent").value) || 3
      };

      try {
        resultSection.classList.remove("hidden");
        document.getElementById("batchTag").innerText = "?? -";
        statusNotice.innerText = "????...";
        document.getElementById("imageGallery").innerHTML = "";
        document.getElementById("videoList").innerHTML = "";
        document.getElementById("warnBox").classList.add("hidden");
        document.getElementById("downloadAllBtn").classList.add("hidden");
        lastPayloadUrls = [];

        const resp = await fetch("/api/generate-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          throw new Error("HTTP " + resp.status);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Parse SSE events from buffer
          while (true) {
            const idx = buffer.indexOf("\n\n");
            if (idx === -1) break;
            const block = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);

            const lines = block.split("\n");
            let eventType = "";
            let dataStr = "";
            for (const line of lines) {
              if (line.startsWith("event: ")) eventType = line.slice(7);
              if (line.startsWith("data: ")) dataStr = line.slice(6);
            }

            if (!dataStr) continue;
            let data;
            try { data = JSON.parse(dataStr); } catch (e) { continue; }

            if (eventType === "status") {
              document.getElementById("batchTag").innerText = "?? " + (data.batch_id || "");
              statusNotice.innerText = data.message || "";
            } else if (eventType === "image") {
              appendImageCard(data.url, data.label);
              statusNotice.innerText = `??? ${data.done}/${data.total}`;
            } else if (eventType === "video") {
              appendVideoCard(data.label || "????", "bg-sky-100 text-sky-800", data.url, "??????");
            } else if (eventType === "popup_video") {
              appendVideoCard(data.label || "????", "bg-violet-100 text-violet-800", data.url, "????");
            } else if (eventType === "error") {
              console.error("????:", data.message);
            } else if (eventType === "done") {
              document.getElementById("batchTag").innerText = "?? " + (data.batch_id || "");
              statusNotice.innerText = (data.status === "failed" ? "??????" : "") + (data.message || "");
              if (data.warnings && data.warnings.length) {
                document.getElementById("warnBox").innerText = data.warnings.join("\n");
                document.getElementById("warnBox").classList.remove("hidden");
              }
              // Refresh history
              loadHistory();
            }
          }
        }
      } catch (error) {
        alert("????: " + error.message);
      } finally {
        btn.disabled = false;
        btn.innerText = "???????";
        cancelBtn.classList.add("hidden");
      }
    }

    // Load history on page start
    loadHistory();
  </script>
</body>
</html>
