<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手动出图 - 小说素材工厂</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loading-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8">
  <div class="mx-auto max-w-4xl space-y-6">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-extrabold text-slate-800">手动出图</h1>
      <a href="/static/index.html" class="rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">返回全自动工厂</a>
    </div>

    <div class="grid gap-6 lg:grid-cols-2">
      <div class="space-y-4">
        <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
          <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-wider border-b pb-2">接口配置</h2>
          <div>
            <label class="mb-1 block text-xs font-medium text-slate-700">API 密钥</label>
            <input id="apiKey" type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none" placeholder="sk-..." oninput="saveApiConfig()" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-slate-700">API 地址</label>
            <input id="apiUrl" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none" value="https://api.geeknow.top/v1" oninput="saveApiConfig()" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-slate-700">出图模型</label>
            <input id="imageModel" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none" oninput="saveApiConfig()" />
          </div>
        </div>

        <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-4">
          <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-wider border-b pb-2">出图参数</h2>
          <div>
            <label class="mb-1 block text-xs font-medium text-slate-700">提示词</label>
            <textarea id="prompt" rows="4" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none" placeholder="输入出图提示词..."></textarea>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">比例类型</label>
              <select id="ratio" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="single">带文本单图 (1:1)</option>
                <option value="lr">左右分屏 (1:1)</option>
                <option value="tb">上下分屏 (1:1)</option>
              </select>
            </div>
            <div>
              <label class="mb-1 block text-xs font-medium text-slate-700">生成数量</label>
              <input id="count" type="number" min="1" max="20" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" value="1" />
            </div>
          </div>
          <button id="generateBtn" onclick="startManual()" class="w-full rounded-xl bg-indigo-600 py-3 text-base font-bold text-white shadow-lg transition-all hover:bg-indigo-700 active:scale-[0.98]">
            开始生成
          </button>
        </div>
      </div>

      <div class="space-y-4">
        <div id="resultSection" class="hidden rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
          <h2 class="text-sm font-bold text-slate-800 border-b pb-2">生成结果</h2>
          <div id="statusMsg" class="text-sm text-slate-600"></div>
          <div id="errorBox" class="hidden rounded-lg bg-red-50 p-3 text-xs text-red-800"></div>
          <div id="imageGallery" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
          <div class="flex items-center justify-between border-b pb-2">
            <h2 class="text-sm font-bold text-emerald-600 uppercase tracking-wider">历史记录</h2>
            <div class="flex items-center gap-2">
              <select id="historyDateFilter" onchange="onHistoryDateChange()" class="rounded border border-slate-300 px-2 py-1 text-[10px] outline-none">
                <option value="">全部日期</option>
              </select>
              <button onclick="clearHistory()" class="rounded border border-red-300 px-2 py-1 text-[10px] text-red-500 hover:bg-red-50">清空</button>
            </div>
          </div>
          <div id="historyList" class="max-h-80 overflow-y-auto space-y-2 text-xs">
            <p class="text-slate-400">暂无记录...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_CONFIG_DEFAULTS = { apiKey: "", apiUrl: "https://api.geeknow.top/v1", imageModel: "gpt-image-1" };

    function saveApiConfig() {
      let cfg = {};
      try { cfg = JSON.parse(localStorage.getItem("novel_api_config")) || {}; } catch (e) {}
      ["apiKey", "apiUrl", "imageModel"].forEach(id => {
        const el = document.getElementById(id);
        if (el) cfg[id] = el.value;
      });
      localStorage.setItem("novel_api_config", JSON.stringify(cfg));
    }

    function loadApiConfig() {
      try {
        const saved = JSON.parse(localStorage.getItem("novel_api_config"));
        if (saved) {
          document.getElementById("apiKey").value = saved.apiKey || "";
          document.getElementById("apiUrl").value = saved.apiUrl || API_CONFIG_DEFAULTS.apiUrl;
          document.getElementById("imageModel").value = saved.imageModel || API_CONFIG_DEFAULTS.imageModel;
        }
      } catch (e) { /* ignore */ }
    }
    loadApiConfig();

    function absUrl(path) {
      if (!path) return "";
      if (path.startsWith("http")) return path;
      const base = window.location.origin.replace(/\/$/, "");
      return base + (path.startsWith("/") ? path : "/" + path);
    }

    async function downloadBlobUrl(url, filename) {
      const res = await fetch(url, { credentials: "same-origin" });
      const blob = await res.blob();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename || "download";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }

    function copyEncodedPrompt(el) {
      const text = decodeURIComponent(el.getAttribute("data-prompt"));
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.createElement("div");
        toast.className = "fixed bottom-4 right-4 rounded bg-slate-800 px-3 py-2 text-xs text-white shadow-lg z-50";
        toast.innerText = "提示词已复制";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
      }).catch(() => alert("复制失败"));
    }

    async function startManual() {
      const btn = document.getElementById("generateBtn");
      const payload = {
        api_key: document.getElementById("apiKey").value,
        api_url: document.getElementById("apiUrl").value,
        image_model_name: document.getElementById("imageModel").value,
        prompt: document.getElementById("prompt").value,
        ratio: document.getElementById("ratio").value,
        count: parseInt(document.getElementById("count").value) || 1
      };

      if (!payload.prompt.trim()) { alert("请输入提示词"); return; }
      if (!payload.api_key.trim()) { alert("请配置 API 密钥"); return; }

      btn.disabled = true;
      btn.innerText = "生成中...";
      document.getElementById("resultSection").classList.remove("hidden");
      document.getElementById("statusMsg").innerText = "正在生成...";
      document.getElementById("imageGallery").innerHTML = "";
      document.getElementById("errorBox").classList.add("hidden");

      try {
        const r = await fetch("/api/generate-manual", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await r.json();

        document.getElementById("statusMsg").innerText = data.message || "完成";
        if (data.errors && data.errors.length) {
          document.getElementById("errorBox").innerText = data.errors.join("\n");
          document.getElementById("errorBox").classList.remove("hidden");
        }

        const gallery = document.getElementById("imageGallery");
        (data.images || []).forEach(src => {
          const full = absUrl(src);
          const name = src.split("/").pop();
          const div = document.createElement("div");
          div.className = "relative overflow-hidden rounded-lg border border-slate-200";
          div.innerHTML = `<img src="${full}" class="aspect-square w-full object-cover" loading="lazy" />
            <button class="absolute bottom-1 right-1 rounded bg-black/70 px-2 py-0.5 text-[10px] text-white hover:bg-black">下载</button>`;
          div.querySelector("button").onclick = () => downloadBlobUrl(full, name);
          gallery.appendChild(div);
        });

        loadHistory();
        loadHistoryDates();
      } catch (e) {
        document.getElementById("statusMsg").innerText = "请求失败: " + e.message;
      } finally {
        btn.disabled = false;
        btn.innerText = "开始生成";
      }
    }

    // --- History ---
    async function loadHistory() {
      try {
        const date = document.getElementById("historyDateFilter").value;
        const url = date ? "/api/history?date=" + encodeURIComponent(date) : "/api/history";
        const r = await fetch(url);
        const data = await r.json();
        renderHistory(data);
      } catch (e) {
        document.getElementById("historyList").innerHTML = '<p class="text-slate-400">加载失败</p>';
      }
    }

    async function loadHistoryDates() {
      try {
        const r = await fetch("/api/history/dates");
        const dates = await r.json();
        const sel = document.getElementById("historyDateFilter");
        const currentVal = sel.value;
        sel.innerHTML = '<option value="">全部日期</option>';
        dates.forEach(d => {
          const opt = document.createElement("option");
          opt.value = d;
          opt.textContent = d;
          sel.appendChild(opt);
        });
        if (dates.includes(currentVal)) sel.value = currentVal;
      } catch (e) { /* ignore */ }
    }

    function onHistoryDateChange() {
      loadHistory();
    }

    function renderHistory(entries) {
      const list = document.getElementById("historyList");
      if (!entries || !entries.length) {
        list.innerHTML = '<p class="text-slate-400">暂无历史记录</p>';
        return;
      }
      const reversed = [...entries].reverse();
      list.innerHTML = reversed.map(e => {
        const typeLabel = { text_single: "文本单图", lr: "左右分屏", tb: "上下分屏", scroll: "滚屏", popup_bg: "弹屏" }[e.type] || e.type;
        const prompt = e.prompt || "";
        const promptDisplay = prompt.length > 60 ? prompt.slice(0, 60) + "..." : prompt;
        const promptTitle = prompt.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return `<div class="flex gap-2 rounded border border-slate-100 p-2 hover:bg-slate-50">
          <img src="${absUrl(e.image_url)}" class="h-16 w-16 rounded object-cover flex-shrink-0 cursor-pointer" onclick="window.open('${absUrl(e.image_url)}')" title="点击查看大图" />
          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-1"><span class="rounded bg-indigo-100 px-1 text-[10px] text-indigo-700">${typeLabel}</span><span class="text-[10px] text-slate-400">${e.timestamp}</span></div>
            <div class="mt-0.5 flex items-center gap-1">
              <p class="truncate text-[11px] text-slate-600 flex-1" title="${promptTitle}">${promptDisplay}</p>
              <button onclick="copyEncodedPrompt(this)" data-prompt="${encodeURIComponent(prompt)}" class="flex-shrink-0 rounded border border-slate-300 px-1.5 py-0.5 text-[10px] text-slate-500 hover:bg-slate-100" title="复制提示词">复制</button>
            </div>
          </div>
        </div>`;
      }).join("");
    }

    async function clearHistory() {
      const date = document.getElementById("historyDateFilter").value;
      const msg = date ? "确认清空 " + date + " 的历史记录？" : "确认清空所有历史记录？";
      if (!confirm(msg)) return;
      const url = date ? "/api/history/clear?date=" + encodeURIComponent(date) : "/api/history/clear";
      await fetch(url, { method: "POST" });
      renderHistory([]);
      loadHistoryDates();
    }

    loadHistoryDates();
    loadHistory();
  </script>
</body>
</html>
